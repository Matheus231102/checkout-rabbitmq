spring.application.name=mensageria
spring.jackson.serialization.write-empty-json-arrays=true

logging.level.root=INFO
logging.level.com.checkout.rbmq=DEBUG
logging.level.org.springframework.amqp=DEBUG
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss}){faint} %clr(%5p) %clr(${PID}){magenta} %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n${LOG_EXCEPTION_CONVERSION_WORD:%wEx}

logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} [%X{correlationId}] - %msg%n

logging.file.name=logs/app.log